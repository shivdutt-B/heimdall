name: Deploy — scale-worker-service

on:
  push:
    branches:
      - main
    paths:
      - 'scale-worker-service/**'
  workflow_dispatch:

concurrency:
  group: deploy-scale-worker-service
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy scale-worker-service to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "→ Checking repo..."
            if [ ! -d ~/heimdall ]; then
              echo "→ Repo not found, cloning fresh..."
              git clone https://github.com/shivdutt-B/heimdall.git ~/heimdall
            fi

            echo "→ Pulling latest code..."
            cd ~/heimdall
            git pull origin main

            echo "→ Injecting environment variables from Doppler..."
            cd scale-worker-service
            DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_SCALE_WORKER }} doppler secrets download \
              --no-file --format env > .env

            echo "→ Installing dependencies..."
            npm install --production=false

            echo "→ Building TypeScript..."
            npm run build

            echo "→ Restarting via PM2..."
            pm2 restart scale-worker-service || pm2 start npm --name "scale-worker-service" -- run start

            echo "✓ scale-worker-service deployed successfully"