name: Deploy Heimdall

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      no_cache_worker:
        description: Force rebuild worker image
        type: boolean
        default: false

# Prevent two deploys from stepping on each other if pushes land close together.
# A second run waits for the first to finish instead of racing it or killing it mid-way.
concurrency:
  group: deploy-heimdall
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Heimdall
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EXC_HOST }}
          username: ${{ secrets.EXC_USER }}
          key: ${{ secrets.EXC_SSH_KEY }}
          command_timeout: 40m

          script: |
            set -euo pipefail

            REPO_DIR="$HOME/heimdall"
            REPO_URL="https://github.com/shivdutt-B/heimdall.git"
            LOG_DIR="$(mktemp -d)"

            ALERT_TOKEN="${{ secrets.DOPPLER_TOKEN_ALERT }}"
            DISPATCH_TOKEN="${{ secrets.DOPPLER_TOKEN_DISPATCH }}"
            WORKER_TOKEN="${{ secrets.DOPPLER_TOKEN_WORKER }}"
            SCALE_WORKER_TOKEN="${{ secrets.DOPPLER_TOKEN_SCALE_WORKER }}"
            NO_CACHE_WORKER="${{ github.event.inputs.no_cache_worker }}"

            log_section() {
              echo ""
              echo "=================================="
              echo "$1"
              echo "=================================="
            }

            # Shared logic for the three simple npm/pm2 services (alert, dispatch, scale-worker)
            deploy_pm2_service() {
              local dir="$1" name="$2" token="$3"

              echo "--- Deploying $name ---"
              cd "$REPO_DIR/$dir"

              DOPPLER_TOKEN="$token" doppler secrets download --no-file --format env > .env

              npm ci --prefer-offline --no-audit --no-fund
              npm run build

              if pm2 describe "$name" >/dev/null 2>&1; then
                pm2 restart "$name"
              else
                pm2 start npm --name "$name" -- run start
              fi

              echo "--- $name deployed successfully ---"
            }

            # Worker image build + scale-worker deploy must stay sequential (scale-worker
            # depends on the freshly built image), but this whole branch is independent
            # of alert-service/dispatch-service, so it runs concurrently with them.
            build_and_deploy_worker() {
              echo "--- Building worker image ---"
              cd "$REPO_DIR/worker-service"

              DOPPLER_TOKEN="$WORKER_TOKEN" doppler secrets download --no-file --format env > .env

              export DOCKER_BUILDKIT=1
              if [ "$NO_CACHE_WORKER" = "true" ]; then
                docker build --no-cache -t heimdall-worker:latest .
              else
                docker build -t heimdall-worker:latest .
              fi
              echo "--- Worker image built ---"

              deploy_pm2_service "scale-worker-service" "scale-worker-service" "$SCALE_WORKER_TOKEN"
            }

            #########################################
            # Sync Repository (self-healing)
            #########################################

            log_section "Updating Repository"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "Repository missing or invalid — cloning fresh..."
              rm -rf "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin
            git reset --hard origin/main

            #########################################
            # Remove Unnecessary Directories
            #########################################

            rm -rf client server readme.assets
            rm -f README.md LICENCE

            #########################################
            # Deploy Services (parallel where possible)
            #########################################

            log_section "Deploying Services"

            deploy_pm2_service "alert-service" "alert-service" "$ALERT_TOKEN" \
              > "$LOG_DIR/alert.log" 2>&1 &
            pid_alert=$!

            deploy_pm2_service "dispatch-service" "dispatch-service" "$DISPATCH_TOKEN" \
              > "$LOG_DIR/dispatch.log" 2>&1 &
            pid_dispatch=$!

            build_and_deploy_worker \
              > "$LOG_DIR/worker.log" 2>&1 &
            pid_worker=$!

            status=0
            for entry in "pid_alert:alert-service" "pid_dispatch:dispatch-service" "pid_worker:worker+scale-worker"; do
              pid_var="${entry%%:*}"
              label="${entry##*:}"
              pid="${!pid_var}"
              if ! wait "$pid"; then
                echo "FAILED: $label (see log below)"
                status=1
              fi
            done

            log_section "Deployment Logs"
            for f in "$LOG_DIR"/*.log; do
              echo "----- $f -----"
              cat "$f"
              echo ""
            done

            if [ "$status" -ne 0 ]; then
              echo "One or more services failed to deploy. See logs above."
              exit 1
            fi

            #########################################
            # Cleanup
            #########################################

            log_section "Cleaning Docker"

            docker image prune -f
            docker container prune -f

            pm2 save
            rm -rf "$LOG_DIR"

            log_section "Deployment Completed Successfully"

            pm2 list
            docker images | grep heimdall