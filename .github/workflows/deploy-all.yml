name: Deploy Heimdall

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      no_cache_worker:
        description: Force rebuild worker image
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EXC
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EXC_HOST }}
          username: ${{ secrets.EXC_USER }}
          key: ${{ secrets.EXC_SSH_KEY }}
          command_timeout: 40m

          script: |
            set -e

            cd ~/heimdall

            git fetch origin
            git reset --hard origin/main

            # Remove unnecessary files
            rm -rf client
            rm -rf server
            rm -rf readme.assets
            rm -f README.md
            rm -f LICENCE

            ############################
            # Alert Service
            ############################

            cd ~/heimdall/alert-service

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_ALERT }}" \
            doppler secrets download --no-file --format env > .env

            npm ci
            npm run build

            pm2 restart alert-service || pm2 start npm --name alert-service -- run start

            ############################
            # Dispatch Service
            ############################

            cd ~/heimdall/dispatch-service

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_DISPATCH }}" \
            doppler secrets download --no-file --format env > .env

            npm ci
            npm run build

            pm2 restart dispatch-service || pm2 start npm --name dispatch-service -- run start

            ############################
            # Worker Docker Image
            ############################

            cd ~/heimdall/worker-service

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_WORKER }}" \
            doppler secrets download --no-file --format env > .env

            if [ "${{ github.event.inputs.no_cache_worker }}" = "true" ]; then
              docker build --no-cache -t heimdall-worker:latest .
            else
              docker build -t heimdall-worker:latest .
            fi

            ############################
            # Scale Worker Service
            ############################

            cd ~/heimdall/scale-worker-service

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_SCALE_WORKER }}" \
            doppler secrets download --no-file --format env > .env

            npm ci
            npm run build

            pm2 restart scale-worker-service || pm2 start npm --name scale-worker-service -- run start

            ############################
            # Cleanup
            ############################

            docker image prune -f
            docker container prune -f

            pm2 save

            echo "Deployment completed successfully."