name: Deploy Heimdall

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      no_cache_worker:
        description: Force rebuild worker image
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Heimdall
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EXC_HOST }}
          username: ${{ secrets.EXC_USER }}
          key: ${{ secrets.EXC_SSH_KEY }}
          command_timeout: 40m

          script: |
            set -e

            REPO_DIR="$HOME/heimdall"

            echo "=================================="
            echo "Updating Repository"
            echo "=================================="

            if [ ! -d "$REPO_DIR" ]; then
              echo "Repository directory not found!"
              exit 1
            fi

            cd "$REPO_DIR"

            if [ ! -d ".git" ]; then
              echo "Directory exists but is NOT a git repository."
              exit 1
            fi

            git remote set-url origin https://github.com/shivdutt-B/heimdall.git
            git fetch origin
            git reset --hard origin/main

            #########################################
            # Remove Unnecessary Directories
            #########################################

            rm -rf client
            rm -rf server
            rm -rf readme.assets
            rm -f README.md
            rm -f LICENCE

            #########################################
            # Alert Service
            #########################################

            echo "Deploying Alert Service..."

            cd "$REPO_DIR/alert-service"

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_ALERT }}" \
            doppler secrets download --no-file --format env > .env

            npm ci
            npm run build

            if pm2 describe alert-service >/dev/null 2>&1; then
              pm2 restart alert-service
            else
              pm2 start npm --name alert-service -- run start
            fi

            #########################################
            # Dispatch Service
            #########################################

            echo "Deploying Dispatch Service..."

            cd "$REPO_DIR/dispatch-service"

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_DISPATCH }}" \
            doppler secrets download --no-file --format env > .env

            npm ci
            npm run build

            if pm2 describe dispatch-service >/dev/null 2>&1; then
              pm2 restart dispatch-service
            else
              pm2 start npm --name dispatch-service -- run start
            fi

            #########################################
            # Worker Docker Image
            #########################################

            echo "Building Worker Image..."

            cd "$REPO_DIR/worker-service"

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_WORKER }}" \
            doppler secrets download --no-file --format env > .env

            if [ "${{ github.event.inputs.no_cache_worker }}" = "true" ]; then
              docker build --no-cache -t heimdall-worker:latest .
            else
              docker build -t heimdall-worker:latest .
            fi

            #########################################
            # Scale Worker Service
            #########################################

            echo "Deploying Scale Worker..."

            cd "$REPO_DIR/scale-worker-service"

            DOPPLER_TOKEN="${{ secrets.DOPPLER_TOKEN_SCALE_WORKER }}" \
            doppler secrets download --no-file --format env > .env

            npm ci
            npm run build

            if pm2 describe scale-worker-service >/dev/null 2>&1; then
              pm2 restart scale-worker-service
            else
              pm2 start npm --name scale-worker-service -- run start
            fi

            #########################################
            # Cleanup
            #########################################

            echo "Cleaning Docker..."

            docker image prune -f
            docker container prune -f

            pm2 save

            echo ""
            echo "=================================="
            echo "Deployment Completed Successfully"
            echo "=================================="

            pm2 list
            docker images | grep heimdall