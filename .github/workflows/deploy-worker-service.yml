name: Deploy — worker-service

on:
  push:
    branches:
      - main
    paths:
      - 'worker-service/**'
  workflow_dispatch:

concurrency:
  group: deploy-worker-service
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & redeploy worker-service Docker image on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "→ Checking repo..."
            if [ ! -d ~/heimdall ]; then
              echo "→ Repo not found, cloning fresh..."
              git clone https://github.com/shivdutt-B/heimdall.git ~/heimdall
            fi

            echo "→ Pulling latest code..."
            cd ~/heimdall
            git pull origin main

            echo "→ Injecting environment variables from Doppler..."
            cd worker-service
            DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_WORKER }} doppler secrets download \
              --no-file --format env > .env

            echo "→ Building Docker image..."
            docker build -t worker-service:latest .

            echo "→ Stopping and removing old worker containers..."
            docker ps -q --filter "ancestor=worker-service:latest" | xargs -r docker stop
            docker ps -aq --filter "ancestor=worker-service:latest" | xargs -r docker rm

            echo "→ Restarting scale-worker-service so it spawns fresh containers..."
            pm2 restart scale-worker-service

            echo "✓ worker-service image rebuilt and containers refreshed"